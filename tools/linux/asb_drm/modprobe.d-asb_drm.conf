# Shipped at /etc/modprobe.d/asb_drm.conf
#
# Keep hyperv_drm unbound: we want asb_drm to own the DRM device the
# compositor binds to.
blacklist hyperv_drm

# Also keep simpledrm out — without it, the EFI boot framebuffer would
# come up as a second DRM card and GNOME treats it as a secondary monitor
# arranged next to asb_drm. The absolute pointer (uinput) then maps across
# the combined width and the cursor leaves the asb_drm region before it
# reaches the right edge of the IDD window. We lose the kernel boot
# splash, but for a VM whose only visible display is the IDD window over
# vsock, that's no loss.
blacklist simpledrm

# Default mode at module load. Override per-VM at /etc/modules-load.d/ or
# via dkms install time if needed.
options asb_drm width=1920 height=1080 refresh=60
