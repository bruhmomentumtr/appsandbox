[Service]
# Strip the Mesa-d3d12 env that the user-environment-generator sets
# for all other user-session children. Mutter on asb_drm has no GBM
# compatibility with the d3d12 gallium pipe (would produce GPU-backed
# buffers asb_drm cannot scan out, resulting in a black screen).
# The compositor stays on llvmpipe; only .desktop-launched apps get
# the GPU acceleration.
#
# Installed at /etc/systemd/user/org.gnome.Shell@.service.d/no-gpu.conf
# (template glob so it applies to org.gnome.Shell@ubuntu.service,
# org.gnome.Shell@wayland.service, etc.).
UnsetEnvironment=LD_LIBRARY_PATH GALLIUM_DRIVER MESA_LOADER_DRIVER_OVERRIDE __GLX_VENDOR_LIBRARY_NAME VK_DRIVER_FILES
